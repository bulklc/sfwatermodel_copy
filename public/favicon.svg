<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <defs>
    <clipPath id="circleClip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  
  <!-- Background circle - white -->
  <circle cx="32" cy="32" r="30" fill="#FFFFFF"/>
  
  <!-- Subtle border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Clipped content -->
  <g clip-path="url(#circleClip)">
    <!-- Priest Reservoir - extends off top right edge -->
    <ellipse cx="48" cy="14" rx="18" ry="7" fill="#2E86C1" opacity="0.9"/>
    
    <!-- Moccasin Reservoir - extends off bottom left edge -->
    <ellipse cx="16" cy="52" rx="18" ry="7" fill="#2E86C1" opacity="0.9"/>
    
    <!-- Penstock - complementary red diagonal -->
    <line x1="44" y1="18" x2="20" y2="48" stroke="#E9A634" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
